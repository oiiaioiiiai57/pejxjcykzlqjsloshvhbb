<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gen Bot — Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#070714;--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0eeff;--muted:#6b6894;--free:#00f5a0;--premium:#bf5fff;--booster:#00c3ff;--extreme:#ff3c5c;--gold:#ffd166;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
.bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.bg-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 10% 20%,rgba(0,245,160,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 90% 80%,rgba(191,95,255,0.07) 0%,transparent 60%);}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px;}
.page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:28px 24px 80px;}
.glass{background:var(--glass);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(20px);}

nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;}
.brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,var(--free),var(--booster));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:10px;font-size:12px;text-decoration:none;transition:all .2s;font-family:'JetBrains Mono',monospace;}
.btn-back:hover{color:var(--text);border-color:var(--border2);}

.profile-header{padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:20px;position:relative;overflow:hidden;animation:fadeUp .5s ease both;}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--free),var(--booster),var(--premium),var(--extreme));}
.avatar{width:80px;height:80px;border-radius:50%;border:3px solid rgba(0,245,160,0.3);box-shadow:0 0 24px rgba(0,245,160,0.15);}
.profile-name{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;}
.profile-tags{display:flex;gap:8px;flex-wrap:wrap;}
.ptag{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:100px;font-family:'JetBrains Mono',monospace;}
.ptag.free   {background:rgba(0,245,160,.15);color:var(--free);}
.ptag.premium{background:rgba(191,95,255,.15);color:var(--premium);}
.ptag.booster{background:rgba(0,195,255,.15);color:var(--booster);}
.ptag.extreme{background:rgba(255,60,92,.15);color:var(--extreme);}
.ptag.staff  {background:rgba(255,209,102,.15);color:var(--gold);}

.section-title{font-size:18px;font-weight:800;letter-spacing:1px;margin:28px 0 14px;}

.gen-list{display:flex;flex-direction:column;gap:10px;}
.gen-item{padding:16px 20px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:all .2s;animation:fadeUp .5s ease both;text-decoration:none;color:inherit;}
.gen-item:hover{border-color:var(--border2);transform:translateX(4px);}
.gen-svc{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.gen-acc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px;}
.gen-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.gen-tier{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:2px 9px;border-radius:100px;font-family:'JetBrains Mono',monospace;}
.gen-tier.free   {background:rgba(0,245,160,.1);color:var(--free);}
.gen-tier.premium{background:rgba(191,95,255,.1);color:var(--premium);}
.gen-tier.booster{background:rgba(0,195,255,.1);color:var(--booster);}
.gen-tier.extreme{background:rgba(255,60,92,.1);color:var(--extreme);}
.gen-date{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.gen-action{font-size:10px;background:var(--glass2);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;}
.gen-action:hover{color:var(--text);border-color:var(--border2);}
.pending-badge{font-size:10px;color:orange;font-family:'JetBrains Mono',monospace;font-style:italic;}
.empty-box{text-align:center;padding:48px;color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-wrap"><div class="bg-mesh"></div><div class="bg-grid"></div></div>
<div class="page">
  <nav>
    <a class="brand" href="/">⚡ GEN BOT</a>
    <a class="btn-back" href="/">← Retour</a>
  </nav>

  <div class="profile-header glass" id="profileHeader">
    <div style="color:var(--muted);font-size:13px">Chargement…</div>
  </div>

  <div class="section-title">📦 Historique des générations</div>
  <div class="gen-list" id="genList"><div class="empty-box glass">Chargement…</div></div>
</div>

<script>
const TOKEN = localStorage.getItem("session_token");
const TIER_LABELS = { free:"Free", premium:"Premium", booster:"Booster", extreme:"Extrême" };
if (!TOKEN) window.location.href = "/";

function svcIcon(n) {
  n=n.toLowerCase();
  if(n.includes("netflix"))return"🎬"; if(n.includes("spotify"))return"🎵";
  if(n.includes("disney"))return"🏰"; if(n.includes("crunchyroll"))return"⛩️";
  if(n.includes("adobe"))return"🎨"; if(n.includes("xbox"))return"🎮";
  if(n.includes("dazn"))return"⚽"; if(n.includes("steam"))return"🖥️";
  return"📋";
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+
         d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}

let revealed = {};

async function load() {
  try {
    const r = await fetch("/api/profile", { headers:{"X-Session-Token":TOKEN} });
    if (!r.ok) { window.location.href = "/"; return; }
    const data = await r.json();

    const avatarUrl = data.avatar
      ? `https://cdn.discordapp.com/avatars/${data.userId}/${data.avatar}.png?size=128`
      : "https://cdn.discordapp.com/embed/avatars/0.png";

    document.getElementById("profileHeader").innerHTML = `
      <img class="avatar" src="${avatarUrl}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
      <div>
        <div class="profile-name">${data.username}</div>
        <div class="profile-tags">
          ${data.tier ? `<span class="ptag ${data.tier}">${TIER_LABELS[data.tier]||data.tier}</span>` : ""}
          ${data.isStaff ? `<span class="ptag staff">⚔️ STAFF</span>` : ""}
        </div>
      </div>`;

    const list = document.getElementById("genList");
    const history = data.genHistory || [];
    if (!history.length) {
      list.innerHTML = '<div class="empty-box glass">📭 Aucune génération pour l\'instant.</div>';
      return;
    }
    list.innerHTML = "";
    history.forEach((e, i) => {
      const hasAcc = !!e.account;
      const accDisplay = hasAcc
        ? (revealed[i]
            ? `<span style="color:var(--free)">${e.account}</span>`
            : "••••••••••••••••••")
        : `<span class="pending-badge">⏳ En attente de validation…</span>`;

      const div = document.createElement("div");
      div.className = "gen-item glass";
      div.style.animationDelay = `${i*0.04}s`;
      div.innerHTML = `
        <div>
          <div class="gen-svc">${svcIcon(e.service)} ${e.service}</div>
          <div class="gen-acc">${accDisplay}</div>
        </div>
        <div class="gen-right">
          <span class="gen-tier ${e.tier}">${TIER_LABELS[e.tier]||e.tier}</span>
          <span class="gen-date">${fmtDate(e.date)}</span>
          ${hasAcc
            ? `<button class="gen-action" onclick="toggleReveal(${i})">${revealed[i]?"Masquer":"Révéler"}</button>`
            : `<a class="gen-action" href="/ticket.html?id=${e.ticketId}">Voir ticket →</a>`}
        </div>`;
      list.appendChild(div);
    });
  } catch(e) {
    document.getElementById("genList").innerHTML = '<div class="empty-box glass">Erreur de chargement.</div>';
  }
}

function toggleReveal(i) { revealed[i] = !revealed[i]; load(); }
load();
</script>
</body>
</html>
