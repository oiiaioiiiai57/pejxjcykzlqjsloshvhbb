<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gen Bot — Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040a;--s:#0a0a14;--s2:#0f0f1c;--border:rgba(255,255,255,.06);--accent:#5c6bff;--cyan:#00d4ff;--green:#39e07a;--purple:#a855f7;--gold:#f5c842;--red:#ff4757;--text:#e2e0f0;--muted:#484660;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(92,107,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(92,107,255,.04) 1px,transparent 1px);background-size:48px 48px;}
.page{position:relative;z-index:1;max-width:820px;margin:0 auto;width:100%;padding:24px;flex:1;display:flex;flex-direction:column;gap:16px;}

nav{display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:'Syne',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:12px;text-decoration:none;transition:all .2s;}
.btn-back:hover{color:var(--text);border-color:rgba(92,107,255,.3);}

.ticket-card{background:var(--s);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:relative;flex:1;display:flex;flex-direction:column;}
.ticket-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--cyan));z-index:1;}

.ticket-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.ticket-title{font-family:'Syne',sans-serif;font-size:20px;letter-spacing:2px;}
.ticket-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:100px;}
.badge.free   {background:rgba(57,224,122,.1);color:var(--green);border:1px solid rgba(57,224,122,.2);}
.badge.premium{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.22);}
.badge.paid   {background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2);}
.badge.pending{background:rgba(255,165,0,.1);color:orange;border:1px solid rgba(255,165,0,.2);}
.badge.done   {background:rgba(57,224,122,.1);color:var(--green);border:1px solid rgba(57,224,122,.2);}
.badge.closed {background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);}

.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;}
.ws-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);}
.ws-dot.error{background:var(--red);}

/* ACCOUNT BOX */
.account-box{margin:16px 24px;background:rgba(57,224,122,.06);border:1px solid rgba(57,224,122,.2);border-radius:12px;padding:16px 20px;display:none;animation:fadeIn .4s ease both;}
.account-box.show{display:block;}
.account-label{font-size:10px;color:var(--green);font-family:'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.account-value{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--green);display:flex;align-items:center;justify-content:space-between;gap:12px;word-break:break-all;}
.copy-btn{background:rgba(57,224,122,.1);border:1px solid rgba(57,224,122,.2);color:var(--green);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;flex-shrink:0;transition:all .15s;}
.copy-btn:hover{background:rgba(57,224,122,.2);}

/* WAITING */
.waiting-box{margin:16px 24px;text-align:center;padding:20px;}
.spinner{width:32px;height:32px;border:3px solid rgba(92,107,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
.waiting-text{color:var(--muted);font-size:13px;line-height:1.6;}

/* CHAT */
.chat-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.chat-messages{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:8px;min-height:200px;max-height:380px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}

.msg{max-width:78%;display:flex;flex-direction:column;gap:3px;animation:fadeIn .2s ease both;}
.msg.member{align-self:flex-end;}
.msg.staff {align-self:flex-start;}
.msg-bubble{padding:9px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg.member .msg-bubble{background:linear-gradient(135deg,var(--accent),#7c8cff);color:#fff;border-bottom-right-radius:4px;}
.msg.staff  .msg-bubble{background:var(--s2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg-meta{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.msg.member .msg-meta{text-align:right;}
.msg-empty{text-align:center;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;padding:28px 0;letter-spacing:1px;}

.chat-input-row{border-top:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;align-items:center;}
.chat-input-row input{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s;}
.chat-input-row input:focus{border-color:rgba(92,107,255,.5);}
.chat-input-row input::placeholder{color:var(--muted);}
.chat-input-row input:disabled{opacity:.4;cursor:not-allowed;}
.btn-send{background:linear-gradient(135deg,var(--accent),var(--cyan));border:none;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .2s;white-space:nowrap;}
.btn-send:hover{opacity:.9;}
.btn-send:disabled{opacity:.35;cursor:not-allowed;}

.closed-bar{background:rgba(255,71,87,.07);border-top:1px solid rgba(255,71,87,.15);padding:11px 24px;text-align:center;font-size:12px;color:var(--red);font-family:'JetBrains Mono',monospace;letter-spacing:1px;display:none;}
.closed-bar.show{display:block;}

.btn-close-ticket{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.2);color:var(--red);padding:7px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.btn-close-ticket:hover{background:rgba(255,71,87,.2);}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="page">

  <nav>
    <a class="nav-brand" href="/">⚡ GEN BOT</a>
    <a class="btn-back" href="/">← Retour</a>
  </nav>

  <div class="ticket-card" id="ticketCard">
    <div class="ticket-header">
      <div class="ticket-title" id="ticketTitle">🎟️ Ticket</div>
      <div class="ticket-meta">
        <div class="ws-dot" id="wsDot" title="WebSocket"></div>
        <span class="badge" id="tierBadge">—</span>
        <span class="badge pending" id="statusBadge">⏳ En attente</span>
        <button class="btn-close-ticket" id="btnClose" style="display:none" onclick="closeTicket()">🔒 Fermer</button>
      </div>
    </div>

    <!-- Compte révélé -->
    <div class="account-box" id="accountBox">
      <div class="account-label">✅ Compte généré — ne le partage avec personne</div>
      <div class="account-value">
        <span id="accountValue"></span>
        <button class="copy-btn" onclick="copyAccount()">Copier</button>
      </div>
    </div>

    <!-- Spinner attente -->
    <div class="waiting-box" id="waitingBox">
      <div class="spinner"></div>
      <div class="waiting-text">En attente de validation par un staff…<br>Tu peux écrire ci-dessous en attendant.</div>
    </div>

    <!-- Chat -->
    <div class="chat-body">
      <div class="chat-messages" id="chatMessages">
        <div class="msg-empty" id="emptyMsg">💬 Aucun message pour l'instant…</div>
      </div>
      <div class="chat-input-row" id="chatInputRow">
        <input type="text" id="msgInput" placeholder="Écris un message…" maxlength="500" onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendMsg();event.preventDefault();}">
        <button class="btn-send" id="sendBtn" onclick="sendMsg()">Envoyer</button>
      </div>
    </div>
    <div class="closed-bar" id="closedBar">🔒 Ce ticket est fermé.</div>
  </div>

</div>
<script>
const API      = "";  // same origin (Railway serves everything)
const WS_BASE  = window.location.origin.replace(/^http/, "ws");
const params   = new URLSearchParams(window.location.search);
const TICKET_ID = params.get("id");
const TOKEN    = localStorage.getItem("session_token");

if (!TICKET_ID || !TOKEN) window.location.href = "/";

let ws         = null;
let isClosed   = false;
let isStaff    = false;
let reconnectN = 0;

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  // Verify session
  const meRes = await fetch(`${API}/auth/me`, { headers: { "X-Session-Token": TOKEN } });
  if (!meRes.ok) { window.location.href = "/"; return; }
  const me = await meRes.json();
  isStaff  = me.isStaff || false;
  if (isStaff) document.getElementById("btnClose").style.display = "inline-block";

  // Load ticket info
  const tRes = await fetch(`${API}/api/ticket/${TICKET_ID}`, { headers: { "X-Session-Token": TOKEN } });
  if (!tRes.ok) { document.getElementById("ticketTitle").textContent = "Ticket introuvable"; return; }
  const t = await tRes.json();

  document.getElementById("ticketTitle").textContent = `🎟️ ${t.service} — ${t.tier.toUpperCase()}`;
  const tb = document.getElementById("tierBadge");
  tb.textContent = t.tier.toUpperCase(); tb.className = `badge ${t.tier}`;

  if (t.closed)              { setClosed(); }
  else if (t.redeemed && t.account) { setRedeemed(t.account); }

  // Load existing messages
  const mRes = await fetch(`${API}/api/ticket/${TICKET_ID}/messages`, { headers: { "X-Session-Token": TOKEN } });
  if (mRes.ok) {
    const { messages, redeemed, closed, account } = await mRes.json();
    messages.forEach(m => appendMsg(m, false));
    if (closed) setClosed();
    else if (redeemed && account) setRedeemed(account);
  }

  connectWS();
}

// ── WEBSOCKET ─────────────────────────────────────────────────
function connectWS() {
  const url = `${WS_BASE}/?token=${encodeURIComponent(TOKEN)}&ticket=${encodeURIComponent(TICKET_ID)}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    reconnectN = 0;
    document.getElementById("wsDot").className = "ws-dot connected";
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === "message") {
      appendMsg(data.msg, true);
      if (data.redeemed && data.account) setRedeemed(data.account);
      if (data.closed) setClosed();
    } else if (data.type === "redeemed") {
      setRedeemed(data.account);
    } else if (data.type === "closed") {
      setClosed();
    }
  };

  ws.onclose = () => {
    document.getElementById("wsDot").className = "ws-dot error";
    if (!isClosed) {
      // Reconnect with backoff
      const delay = Math.min(1000 * 2 ** reconnectN, 30000);
      reconnectN++;
      setTimeout(connectWS, delay);
    }
  };

  ws.onerror = () => {
    document.getElementById("wsDot").className = "ws-dot error";
  };
}

// ── DOM HELPERS ───────────────────────────────────────────────
function appendMsg(msg, animate = true) {
  const container = document.getElementById("chatMessages");
  document.getElementById("emptyMsg")?.remove();

  const type = msg.authorType === "staff" ? "staff" : "member";
  const time = new Date(msg.timestamp).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

  const div = document.createElement("div");
  div.className = `msg ${type}`;
  if (!animate) div.style.animation = "none";
  div.innerHTML = `
    <div class="msg-bubble">${esc(msg.content)}</div>
    <div class="msg-meta">${esc(msg.authorName)} · ${time}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function setRedeemed(account) {
  document.getElementById("waitingBox").style.display  = "none";
  document.getElementById("accountBox").className      = "account-box show";
  document.getElementById("accountValue").textContent  = account;
  document.getElementById("statusBadge").className     = "badge done";
  document.getElementById("statusBadge").textContent   = "✅ Validé";
}

function setClosed() {
  isClosed = true;
  document.getElementById("closedBar").className      = "closed-bar show";
  document.getElementById("chatInputRow").style.display = "none";
  document.getElementById("waitingBox").style.display = "none";
  document.getElementById("statusBadge").className    = "badge closed";
  document.getElementById("statusBadge").textContent  = "🔒 Fermé";
  if (ws) ws.close();
}

// ── SEND ──────────────────────────────────────────────────────
async function sendMsg() {
  if (isClosed) return;
  const input = document.getElementById("msgInput");
  const btn   = document.getElementById("sendBtn");
  const content = input.value.trim();
  if (!content) return;

  btn.disabled   = true;
  input.disabled = true;

  try {
    const r = await fetch(`${API}/api/ticket/${TICKET_ID}/messages`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Session-Token": TOKEN },
      body: JSON.stringify({ content }),
    });
    if (r.ok) { input.value = ""; }
    else {
      const { error } = await r.json();
      alert(error || "Erreur d'envoi.");
    }
  } finally {
    btn.disabled   = false;
    input.disabled = false;
    input.focus();
  }
}

// ── CLOSE ─────────────────────────────────────────────────────
async function closeTicket() {
  if (!isStaff || !confirm("Fermer ce ticket ?")) return;
  const r = await fetch(`${API}/api/ticket/${TICKET_ID}/close`, {
    method: "POST", headers: { "X-Session-Token": TOKEN },
  });
  if (r.ok) setClosed();
}

// ── COPY ──────────────────────────────────────────────────────
function copyAccount() {
  const val = document.getElementById("accountValue").textContent;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "Copié !";
    setTimeout(() => { btn.textContent = "Copier"; }, 2000);
  });
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;")
    .replace(/\n/g,"<br>");
}

init();
</script>
</body>
</html>
