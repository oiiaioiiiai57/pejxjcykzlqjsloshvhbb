<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gen Bot — Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2ff;--surface:#fff;--surface2:#f5f7ff;
  --border:rgba(99,102,241,.12);--text:#0f0e2e;--muted:#6b7280;
  --free:#10b981;--premium:#8b5cf6;--booster:#0ea5e9;--extreme:#ef4444;
  --accent:#6366f1;--shadow:0 4px 24px rgba(99,102,241,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.bg-deco{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25;}
.blob-1{width:500px;height:500px;top:-100px;left:-100px;background:radial-gradient(circle,#c7d2fe,#a5b4fc);}
.blob-2{width:400px;height:400px;bottom:-80px;right:-80px;background:radial-gradient(circle,#bbf7d0,#6ee7b7);}
.page{position:relative;z-index:1;max-width:820px;margin:0 auto;width:100%;padding:24px;flex:1;display:flex;flex-direction:column;gap:16px;}

nav{display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:20px;font-weight:900;letter-spacing:-0.5px;text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--booster));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn-back{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:10px;font-size:13px;text-decoration:none;transition:all .2s;box-shadow:var(--shadow);font-weight:500;}
.btn-back:hover{border-color:rgba(99,102,241,.3);color:var(--text);}

.ticket-card{background:var(--surface);border:1.5px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(99,102,241,.12);flex:1;display:flex;flex-direction:column;position:relative;}
.ticket-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--booster),var(--free),var(--extreme));z-index:1;}

.ticket-header{padding:20px 28px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.ticket-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.ticket-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;font-family:'Space Mono',monospace;}
.badge.free   {background:rgba(16,185,129,.1);color:var(--free);border:1.5px solid rgba(16,185,129,.3);}
.badge.premium{background:rgba(139,92,246,.1);color:var(--premium);border:1.5px solid rgba(139,92,246,.3);}
.badge.booster{background:rgba(14,165,233,.1);color:var(--booster);border:1.5px solid rgba(14,165,233,.3);}
.badge.extreme{background:rgba(239,68,68,.1);color:var(--extreme);border:1.5px solid rgba(239,68,68,.3);}
.badge.pending{background:rgba(245,158,11,.1);color:#f59e0b;border:1.5px solid rgba(245,158,11,.3);}
.badge.done   {background:rgba(16,185,129,.1);color:var(--free);border:1.5px solid rgba(16,185,129,.3);}
.badge.closed {background:rgba(239,68,68,.1);color:var(--extreme);border:1.5px solid rgba(239,68,68,.3);}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;}
.ws-dot.connected{background:var(--free);box-shadow:0 0 0 3px rgba(16,185,129,.2);}

.account-box{margin:16px 28px;background:rgba(16,185,129,.06);border:1.5px solid rgba(16,185,129,.25);border-radius:14px;padding:18px 22px;display:none;animation:fadeUp .4s ease both;}
.account-box.show{display:block;}
.acc-label{font-size:10px;color:var(--free);font-family:'Space Mono',monospace;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.acc-value{font-family:'Space Mono',monospace;font-size:14px;color:var(--free);display:flex;align-items:center;justify-content:space-between;gap:12px;word-break:break-all;background:rgba(16,185,129,.05);padding:12px 16px;border-radius:10px;}
.copy-btn{background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.3);color:var(--free);padding:6px 14px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700;transition:all .15s;flex-shrink:0;}
.copy-btn:hover{background:rgba(16,185,129,.25);}

.waiting-box{margin:20px 28px;text-align:center;padding:28px;}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
.waiting-text{color:var(--muted);font-size:14px;line-height:1.6;}

.chat-body{flex:1;display:flex;flex-direction:column;min-height:0;}
.chat-messages{flex:1;overflow-y:auto;padding:16px 28px;display:flex;flex-direction:column;gap:10px;min-height:200px;max-height:360px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(99,102,241,.15);border-radius:2px;}

.msg{max-width:78%;display:flex;flex-direction:column;gap:4px;animation:fadeUp .2s ease both;}
.msg.member{align-self:flex-end;}
.msg.staff {align-self:flex-start;}
.msg-bubble{padding:10px 16px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg.member .msg-bubble{background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;border-bottom-right-radius:4px;}
.msg.staff  .msg-bubble{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg-meta{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.msg.member .msg-meta{text-align:right;}
.msg-empty{text-align:center;color:var(--muted);font-size:13px;padding:32px 0;font-style:italic;}

.chat-input-row{border-top:1.5px solid var(--border);padding:16px 24px;display:flex;gap:10px;align-items:center;background:var(--surface);}
.chat-input-row input{flex:1;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:11px 16px;border-radius:12px;font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:all .2s;font-weight:500;}
.chat-input-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
.chat-input-row input::placeholder{color:var(--muted);}
.chat-input-row input:disabled{opacity:.4;cursor:not-allowed;}
.btn-send{background:linear-gradient(135deg,var(--accent),var(--booster));border:none;color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap;box-shadow:0 4px 14px rgba(99,102,241,.3);}
.btn-send:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.4);}
.btn-send:disabled{opacity:.35;cursor:not-allowed;transform:none;}

.closed-bar{background:rgba(239,68,68,.06);border-top:1.5px solid rgba(239,68,68,.2);padding:12px 28px;text-align:center;font-size:12px;color:var(--extreme);font-family:'Space Mono',monospace;letter-spacing:1px;font-weight:700;display:none;}
.closed-bar.show{display:block;}

.btn-close-ticket{background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.25);color:var(--extreme);padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;}
.btn-close-ticket:hover{background:rgba(239,68,68,.15);}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-deco"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="page">
  <nav>
    <a class="brand" href="/">⚡ GEN BOT</a>
    <a class="btn-back" href="/">← Back</a>
  </nav>

  <div class="ticket-card">
    <div class="ticket-header">
      <div class="ticket-title" id="ticketTitle">🎟️ Ticket</div>
      <div class="ticket-meta">
        <div class="ws-dot" id="wsDot" title="WebSocket status"></div>
        <span class="badge" id="tierBadge">—</span>
        <span class="badge pending" id="statusBadge">⏳ Pending</span>
        <button class="btn-close-ticket" id="btnClose" style="display:none" onclick="closeTicket()">🔒 Close</button>
      </div>
    </div>

    <div class="account-box" id="accountBox">
      <div class="acc-label">✅ Account Generated — Keep it private!</div>
      <div class="acc-value">
        <span id="accountValue"></span>
        <button class="copy-btn" onclick="copyAccount()">Copy</button>
      </div>
    </div>

    <div class="waiting-box" id="waitingBox">
      <div class="spinner"></div>
      <div class="waiting-text">Waiting for staff validation…<br>Feel free to chat below while you wait.</div>
    </div>

    <div class="chat-body">
      <div class="chat-messages" id="chatMessages">
        <div class="msg-empty" id="emptyMsg">💬 No messages yet…</div>
      </div>
      <div class="chat-input-row" id="chatInputRow">
        <input type="text" id="msgInput" placeholder="Type a message…" maxlength="500" onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendMsg();event.preventDefault();}">
        <button class="btn-send" id="sendBtn" onclick="sendMsg()">Send</button>
      </div>
    </div>
    <div class="closed-bar" id="closedBar">🔒 This ticket is closed.</div>
  </div>
</div>

<script>
const WS_BASE  = window.location.origin.replace(/^http/,"ws");
const params   = new URLSearchParams(window.location.search);
const TICKET_ID = params.get("id");
const TOKEN    = localStorage.getItem("session_token");
if (!TICKET_ID||!TOKEN) window.location.href="/";

let ws=null, isClosed=false, isStaff=false, reconnectN=0;

async function init(){
  const meRes=await fetch("/auth/me",{headers:{"X-Session-Token":TOKEN}});
  if(!meRes.ok){window.location.href="/";return;}
  const me=await meRes.json();
  isStaff=me.isStaff||false;
  if(isStaff) document.getElementById("btnClose").style.display="inline-block";

  const tRes=await fetch(`/api/ticket/${TICKET_ID}`,{headers:{"X-Session-Token":TOKEN}});
  if(!tRes.ok){document.getElementById("ticketTitle").textContent="Ticket not found";return;}
  const t=await tRes.json();

  document.getElementById("ticketTitle").textContent=`🎟️ ${t.service} — ${t.tier.toUpperCase()}`;
  const tb=document.getElementById("tierBadge");
  tb.textContent=t.tier.toUpperCase(); tb.className=`badge ${t.tier}`;
  if(t.closed) setClosed();
  else if(t.redeemed&&t.account) setRedeemed(t.account);

  const mRes=await fetch(`/api/ticket/${TICKET_ID}/messages`,{headers:{"X-Session-Token":TOKEN}});
  if(mRes.ok){
    const {messages,redeemed,closed,account}=await mRes.json();
    messages.forEach(m=>appendMsg(m,false));
    if(closed) setClosed();
    else if(redeemed&&account) setRedeemed(account);
  }
  connectWS();
}

function connectWS(){
  ws=new WebSocket(`${WS_BASE}/?token=${encodeURIComponent(TOKEN)}&ticket=${encodeURIComponent(TICKET_ID)}`);
  ws.onopen=()=>{ reconnectN=0; document.getElementById("wsDot").className="ws-dot connected"; };
  ws.onmessage=(e)=>{
    const data=JSON.parse(e.data);
    if(data.type==="message"){ appendMsg(data.msg,true); if(data.redeemed&&data.account) setRedeemed(data.account); if(data.closed) setClosed(); }
    else if(data.type==="redeemed") setRedeemed(data.account);
    else if(data.type==="closed")   setClosed();
  };
  ws.onclose=()=>{
    document.getElementById("wsDot").className="ws-dot";
    if(!isClosed){ const d=Math.min(1000*2**reconnectN,30000); reconnectN++; setTimeout(connectWS,d); }
  };
}

function appendMsg(msg,animate=true){
  const c=document.getElementById("chatMessages");
  document.getElementById("emptyMsg")?.remove();
  const type=msg.authorType==="staff"?"staff":"member";
  const time=new Date(msg.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const div=document.createElement("div");
  div.className=`msg ${type}`;
  if(!animate) div.style.animation="none";
  div.innerHTML=`<div class="msg-bubble">${esc(msg.content)}</div><div class="msg-meta">${esc(msg.authorName)} · ${time}</div>`;
  c.appendChild(div);
  c.scrollTop=c.scrollHeight;
}

function setRedeemed(account){
  document.getElementById("waitingBox").style.display="none";
  document.getElementById("accountBox").className="account-box show";
  document.getElementById("accountValue").textContent=account;
  document.getElementById("statusBadge").className="badge done";
  document.getElementById("statusBadge").textContent="✅ Validated";
}

function setClosed(){
  isClosed=true;
  document.getElementById("closedBar").className="closed-bar show";
  document.getElementById("chatInputRow").style.display="none";
  document.getElementById("waitingBox").style.display="none";
  document.getElementById("statusBadge").className="badge closed";
  document.getElementById("statusBadge").textContent="🔒 Closed";
  if(ws) ws.close();
}

async function sendMsg(){
  if(isClosed) return;
  const input=document.getElementById("msgInput"), btn=document.getElementById("sendBtn");
  const content=input.value.trim(); if(!content) return;
  btn.disabled=true; input.disabled=true;
  try{
    const r=await fetch(`/api/ticket/${TICKET_ID}/messages`,{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":TOKEN},body:JSON.stringify({content})});
    if(r.ok) input.value="";
    else { const {error}=await r.json(); alert(error||"Send error."); }
  }finally{ btn.disabled=false; input.disabled=false; input.focus(); }
}

async function closeTicket(){
  if(!isStaff||!confirm("Close this ticket?")) return;
  const r=await fetch(`/api/ticket/${TICKET_ID}/close`,{method:"POST",headers:{"X-Session-Token":TOKEN}});
  if(r.ok) setClosed();
}

function copyAccount(){
  navigator.clipboard.writeText(document.getElementById("accountValue").textContent).then(()=>{
    const btn=document.querySelector(".copy-btn");
    btn.textContent="Copied!"; setTimeout(()=>{btn.textContent="Copy";},2000);
  });
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

init();
</script>
</body>
</html>
