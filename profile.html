<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gen Bot — Profil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040a;--s:#0a0a14;--s2:#0f0f1c;--border:rgba(255,255,255,.06);--accent:#5c6bff;--cyan:#00d4ff;--green:#39e07a;--purple:#a855f7;--gold:#f5c842;--red:#ff4757;--text:#e2e0f0;--muted:#484660;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(92,107,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(92,107,255,.04) 1px,transparent 1px);background-size:48px 48px;}
.page{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:24px 24px 60px;}

nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:12px;text-decoration:none;transition:all .2s;}
.btn-back:hover{color:var(--text);border-color:rgba(92,107,255,.3);}

.profile-header{background:var(--s);border:1px solid var(--border);border-radius:20px;padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:20px;position:relative;overflow:hidden;}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--cyan));}
.avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(92,107,255,.3);}
.profile-info{flex:1;}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:6px;}
.profile-badges{display:flex;gap:8px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:100px;}
.badge.free{background:rgba(57,224,122,.1);color:var(--green);border:1px solid rgba(57,224,122,.2);}
.badge.premium{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.22);}
.badge.paid{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2);}
.badge.staff{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);}

.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:rgba(255,255,255,.6);margin:24px 0 12px;}

.gen-list{display:flex;flex-direction:column;gap:10px;}
.gen-item{background:var(--s);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;transition:border-color .2s;cursor:pointer;text-decoration:none;}
.gen-item:hover{border-color:rgba(92,107,255,.3);}
.gen-item-left{}
.gen-service{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.gen-account{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px;}
.gen-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.gen-date{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.gen-tier{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:100px;}
.gen-tier.free{background:rgba(57,224,122,.1);color:var(--green);}
.gen-tier.premium{background:rgba(168,85,247,.1);color:var(--purple);}
.gen-tier.paid{background:rgba(245,200,66,.1);color:var(--gold);}

.empty-box{text-align:center;padding:40px;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace;letter-spacing:1px;}

.reveal-btn{background:rgba(92,107,255,.1);border:1px solid rgba(92,107,255,.2);color:var(--accent);padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
.reveal-btn:hover{background:rgba(92,107,255,.2);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="page">
  <nav>
    <a class="nav-brand" href="index.html">⚡ GEN BOT</a>
    <a class="btn-back" href="index.html">← Retour</a>
  </nav>

  <div class="profile-header" id="profileHeader">
    <div style="color:var(--muted);font-size:13px">Chargement…</div>
  </div>

  <div class="section-title">📦 Historique des générations</div>
  <div class="gen-list" id="genList">
    <div class="empty-box">Chargement…</div>
  </div>
</div>

<script>
const API = "https://pejxjcykzlqjsloshvhbb-production.up.railway.app";
const sessionToken = localStorage.getItem("session_token");

if (!sessionToken) window.location.href = "index.html";

function svcIcon(n){
  n=n.toLowerCase();
  if(n.includes("netflix"))return"🎬";if(n.includes("spotify"))return"🎵";
  if(n.includes("disney"))return"🏰";if(n.includes("crunchyroll"))return"⛩️";
  if(n.includes("adobe"))return"🎨";if(n.includes("xbox"))return"🎮";
  if(n.includes("minecraft"))return"⛏️";if(n.includes("steam"))return"🖥️";
  return"📋";
}

function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+
         d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}

let revealed = {};
let _historyData = [];

async function load() {
  try {
    const r = await fetch(`${API}/api/profile`, {headers:{"X-Session-Token":sessionToken}});
    if (!r.ok) { window.location.href="index.html"; return; }
    const data = await r.json();

    // Header
    const avatarUrl = data.avatar
      ? `https://cdn.discordapp.com/avatars/${data.user_id}/${data.avatar}.png?size=128`
      : "https://cdn.discordapp.com/embed/avatars/0.png";

    document.getElementById("profileHeader").innerHTML = `
      <img class="avatar" src="${avatarUrl}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
      <div class="profile-info">
        <div class="profile-name">${data.username}</div>
        <div class="profile-badges">
          ${data.tier ? `<span class="badge ${data.tier}">${data.tier.toUpperCase()}</span>` : ""}
          ${data.is_staff ? `<span class="badge staff">⚔️ STAFF</span>` : ""}
        </div>
      </div>
    `;

    // Historique
    const list = document.getElementById("genList");
    const history = data.gen_history || [];
    if (!history.length) {
      list.innerHTML = '<div class="empty-box">📭 Aucune génération pour l\'instant.</div>';
      return;
    }

    list.innerHTML = "";
    _historyData = history;
    history.forEach((entry, i) => {
      const div = document.createElement("div");
      div.className = "gen-item";
      div.innerHTML = `
        <div class="gen-item-left">
          <div class="gen-service">${svcIcon(entry.service)} ${entry.service}</div>
          <div class="gen-account" id="acc-${i}" style="max-width:340px;overflow:hidden;text-overflow:ellipsis">
            ${revealed[i]
              ? `<span style="color:var(--green)">${entry.account}</span>`
              : '••••••••••••••••••'}
          </div>
        </div>
        <div class="gen-item-right">
          <span class="gen-tier ${entry.tier}">${entry.tier.toUpperCase()}</span>
          <span class="gen-date">${fmtDate(entry.date)}</span>
          <button class="reveal-btn" data-reveal-idx="${i}" onclick="toggleReveal(${i}, '${entry.account.replace(/'/g,'\\'')}')">
            ${revealed[i] ? "Masquer" : "Révéler"}
          </button>
        </div>
      `;
      list.appendChild(div);
    });

  } catch(e) {
    document.getElementById("genList").innerHTML = '<div class="empty-box">Erreur de chargement.</div>';
  }
}

function toggleReveal(i, account) {
  revealed[i] = !revealed[i];
  const accEl = document.getElementById(`acc-${i}`);
  const btnEl = document.querySelector(`[data-reveal-idx="${i}"]`);
  const safe = account.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  if (accEl) {
    accEl.innerHTML = revealed[i]
      ? `<span style="color:var(--green)">${safe}</span>`
      : '••••••••••••••••••';
  }
  if (btnEl) btnEl.textContent = revealed[i] ? "Masquer" : "Révéler";
}

load();
</script>
</body>
</html>
