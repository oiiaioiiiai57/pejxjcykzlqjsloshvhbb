<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gen Bot — Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#04040a;--s:#0a0a14;--s2:#0f0f1c;--border:rgba(255,255,255,.06);--accent:#5c6bff;--cyan:#00d4ff;--green:#39e07a;--purple:#a855f7;--gold:#f5c842;--red:#ff4757;--text:#e2e0f0;--muted:#484660;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(92,107,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(92,107,255,.04) 1px,transparent 1px);background-size:48px 48px;}
.page{position:relative;z-index:1;max-width:800px;margin:0 auto;width:100%;padding:24px;flex:1;display:flex;flex-direction:column;gap:16px;}

nav{display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.btn-back{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:12px;text-decoration:none;transition:all .2s;}
.btn-back:hover{color:var(--text);border-color:rgba(92,107,255,.3);}

.ticket-card{background:var(--s);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:relative;}
.ticket-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--cyan));}
.ticket-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.ticket-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.ticket-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:100px;}
.badge.free{background:rgba(57,224,122,.1);color:var(--green);border:1px solid rgba(57,224,122,.2);}
.badge.premium{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.22);}
.badge.paid{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2);}
.badge.pending{background:rgba(255,165,0,.1);color:orange;border:1px solid rgba(255,165,0,.2);}
.badge.done{background:rgba(57,224,122,.1);color:var(--green);border:1px solid rgba(57,224,122,.2);}
.badge.closed{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2);}

/* ACCOUNT REVEALED */
.account-box{margin:20px 24px;background:rgba(57,224,122,.06);border:1px solid rgba(57,224,122,.2);border-radius:12px;padding:18px 20px;display:none;}
.account-box.show{display:block;}
.account-box-label{font-size:10px;color:var(--green);font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.account-value{font-family:'DM Mono',monospace;font-size:15px;color:var(--green);display:flex;align-items:center;justify-content:space-between;gap:12px;word-break:break-all;}
.copy-btn{background:rgba(57,224,122,.1);border:1px solid rgba(57,224,122,.2);color:var(--green);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;flex-shrink:0;transition:all .15s;}
.copy-btn:hover{background:rgba(57,224,122,.2);}

/* WAITING */
.waiting-box{margin:20px 24px;text-align:center;padding:24px;display:none;}
.waiting-box.show{display:block;}
.spinner{width:36px;height:36px;border:3px solid rgba(92,107,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
.waiting-text{color:var(--muted);font-size:13px;}

/* CHAT */
.chat-section{flex:1;display:flex;flex-direction:column;}
.chat-messages{flex:1;min-height:300px;max-height:420px;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:10px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-track{background:transparent;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.msg{max-width:75%;display:flex;flex-direction:column;gap:3px;}
.msg.member{align-self:flex-end;}
.msg.staff{align-self:flex-start;}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;}
.msg.member .msg-bubble{background:linear-gradient(135deg,var(--accent),#7c8cff);color:#fff;border-bottom-right-radius:4px;}
.msg.staff  .msg-bubble{background:var(--s2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.msg.member .msg-meta{text-align:right;}
.msg-empty{text-align:center;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;padding:32px 0;letter-spacing:1px;}

.chat-input{border-top:1px solid var(--border);padding:16px 24px;display:flex;gap:10px;background:var(--s);}
.chat-input input{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.chat-input input:focus{border-color:rgba(92,107,255,.5);}
.chat-input input::placeholder{color:var(--muted);}
.btn-send{background:linear-gradient(135deg,var(--accent),var(--cyan));border:none;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;}
.btn-send:hover{opacity:.9;}
.btn-send:disabled{opacity:.4;cursor:not-allowed;}

.closed-bar{background:rgba(255,71,87,.08);border-top:1px solid rgba(255,71,87,.2);padding:12px 24px;text-align:center;font-size:12px;color:var(--red);font-family:'DM Mono',monospace;letter-spacing:1px;display:none;}
.closed-bar.show{display:block;}

.btn-close-ticket{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.2);color:var(--red);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-close-ticket:hover{background:rgba(255,71,87,.2);}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="page">
  <nav>
    <a class="nav-brand" href="index.html">⚡ GEN BOT</a>
    <a class="btn-back" href="index.html">← Retour</a>
  </nav>

  <div class="ticket-card" id="ticketCard">
    <div class="ticket-header">
      <div class="ticket-title">🎟️ <span id="ticketTitle">Ticket</span></div>
      <div class="ticket-meta">
        <span class="badge" id="tierBadge">—</span>
        <span class="badge pending" id="statusBadge">⏳ En attente</span>
        <button class="btn-close-ticket" id="btnClose" style="display:none" onclick="closeTicket()">🔒 Fermer</button>
      </div>
    </div>

    <!-- Compte révélé après redeem -->
    <div class="account-box" id="accountBox">
      <div class="account-box-label">✅ Compte généré</div>
      <div class="account-value">
        <span id="accountValue"></span>
        <button class="copy-btn" id="copyBtn" onclick="copyAccount()">Copy</button>
      </div>
    </div>

    <!-- Spinner attente -->
    <div class="waiting-box show" id="waitingBox">
      <div class="spinner"></div>
      <div class="waiting-text">En attente de validation par un staff…<br>Tu peux discuter ci-dessous en attendant.</div>
    </div>

    <!-- Chat -->
    <div class="chat-section">
      <div class="chat-messages" id="chatMessages">
        <div class="msg-empty" id="emptyMsg">💬 Aucun message pour l'instant…</div>
      </div>
      <div class="chat-input" id="chatInput">
        <input type="text" id="msgInput" placeholder="Écris un message…" maxlength="500" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn-send" id="sendBtn" onclick="sendMsg()">Envoyer</button>
      </div>
    </div>
    <div class="closed-bar" id="closedBar">🔒 Ce ticket est fermé — plus aucun message possible.</div>
  </div>
</div>

<script>
const API = "https://pejxjcykzlqjsloshvhbb-production.up.railway.app";
const params    = new URLSearchParams(window.location.search);
const ticketId  = params.get("id");
const tokenKey  = "session_token";

if (!ticketId || ticketId === "null") { window.location.href = "index.html"; }
let   sessionToken   = localStorage.getItem(tokenKey);
let   lastMsgId      = 0;
let   pollInterval   = null;
let   isStaff        = false;
let   isClosed       = false;
let   lastActivity   = Date.now();
let   currentPollMs  = 3000;  // démarre à 3s
const MIN_POLL_MS    = 3000;
const MAX_POLL_MS    = 10000; // max 10s quand inactif

if (!ticketId) { window.location.href = "index.html"; }

async function init() {
  if (!sessionToken) { window.location.href = "index.html?error=login"; return; }

  // Vérifier session
  try {
    const r = await fetch(`${API}/auth/me`, {headers:{"X-Session-Token":sessionToken}});
    if (!r.ok) { window.location.href = "index.html"; return; }
    const me = await r.json();
    isStaff = me.is_staff || false;
    if (isStaff) document.getElementById("btnClose").style.display = "inline-block";
  } catch(e) { window.location.href = "index.html"; return; }

  // Charger le ticket
  try {
    const r = await fetch(`${API}/api/ticket/${ticketId}`, {headers:{"X-Session-Token":sessionToken}});
    if (!r.ok) { document.getElementById("ticketTitle").textContent = "Ticket introuvable"; return; }
    const t = await r.json();

    document.getElementById("ticketTitle").textContent = `${t.service} — ${t.tier.toUpperCase()}`;
    const tb = document.getElementById("tierBadge");
    tb.textContent = t.tier.toUpperCase(); tb.className = `badge ${t.tier}`;

    if (t.closed) { setClosed(); }
    else if (t.redeemed && t.account) { setRedeemed(t.account); }
  } catch(e) {}

  // Polling adaptatif: plus fréquent si actif, ralentit si inactif
  function _scheduleNextPoll() {
    if (pollInterval) clearTimeout(pollInterval);
    if (isClosed) return;
    const idle = Date.now() - lastActivity;
    currentPollMs = idle > 30000 ? MAX_POLL_MS : MIN_POLL_MS;
    pollInterval = setTimeout(async () => { await pollMessages(); _scheduleNextPoll(); }, currentPollMs);
  }
  pollMessages().then(_scheduleNextPoll);
}

async function pollMessages() {
  try {
    const r = await fetch(`${API}/api/ticket/${ticketId}/messages?after=${lastMsgId}`, {
      headers:{"X-Session-Token":sessionToken}
    });
    if (!r.ok) return;
    const data = await r.json();

    // Fermeture
    if (data.closed && !isClosed) { setClosed(); }

    // Compte révélé
    if (data.redeemed && data.account) { setRedeemed(data.account); }

    // Nouveaux messages — toujours traité, même après redeemed
    if (data.messages && data.messages.length > 0) {
      const container = document.getElementById("chatMessages");
      const empty = document.getElementById("emptyMsg");
      if (empty) empty.remove();
      let added = 0;
      data.messages.forEach(msg => {
        if (msg.id <= lastMsgId) return; // already rendered
        lastMsgId = Math.max(lastMsgId, msg.id);
        const d = document.createElement("div");
        d.className = `msg ${msg.author_type}`;
        const time = new Date(msg.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
        d.innerHTML = `
          <div class="msg-bubble">${escHtml(msg.content)}</div>
          <div class="msg-meta">${escHtml(msg.author_name)} · ${time}</div>
        `;
        d.style.animation = "fadeIn .25s ease both";
        container.appendChild(d);
        added++;
      });
      if (added > 0) container.scrollTop = container.scrollHeight;
    }
  } catch(e) {
    console.warn("Poll error:", e);
  }
}

function setRedeemed(account) {
  document.getElementById("waitingBox").className = "waiting-box";
  document.getElementById("accountBox").className  = "account-box show";
  document.getElementById("accountValue").textContent = account;
  document.getElementById("statusBadge").className  = "badge done";
  document.getElementById("statusBadge").textContent = "✅ Validé";
}

function setClosed() {
  isClosed = true;
  document.getElementById("closedBar").className = "closed-bar show";
  document.getElementById("chatInput").style.display = "none";
  document.getElementById("statusBadge").className = "badge closed";
  document.getElementById("statusBadge").textContent = "🔒 Fermé";
  document.getElementById("waitingBox").className = "waiting-box";
  if (pollInterval) { clearTimeout(pollInterval); pollInterval = null; }
}

async function sendMsg() {
  lastActivity = Date.now(); // reset idle timer
  if (isClosed) return;
  const input = document.getElementById("msgInput");
  const btn   = document.getElementById("sendBtn");
  const content = input.value.trim();
  if (!content) return;
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/ticket/${ticketId}/messages`, {
      method:"POST",
      headers:{"Content-Type":"application/json","X-Session-Token":sessionToken},
      body: JSON.stringify({content}),
    });
    if (r.ok) { input.value = ""; await pollMessages(); }
  } finally { btn.disabled = false; input.focus(); }
}

async function closeTicket() {
  if (!isStaff || !confirm("Fermer ce ticket ?")) return;
  await fetch(`${API}/api/ticket/${ticketId}/close`, {
    method:"POST", headers:{"X-Session-Token":sessionToken}
  });
  setClosed();
}

function copyAccount() {
  const val = document.getElementById("accountValue").textContent;
  navigator.clipboard.writeText(val).then(()=>{
    const btn = document.getElementById("copyBtn");
    btn.textContent = "Copied!";
    setTimeout(()=>{ btn.textContent = "Copy"; }, 2000);
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

init();
</script>
</body>
</html>
